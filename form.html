<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mala-tang Order</title>
</head>
<body>
    <h1>Mala-tang</h1>
    <p>Order here</p>

    <form action="" method="get">

        <label for="cname">
            กรอกชื่อของคุณ :
            <input id="cname" type="text" name="cname" required>
        </label>

    <br>

        <p>เลือกน้ำซุป</p>
        <label>
            ซุปหม่าล่า
            <input type="radio" name="soup" />
        </label>

        <label>
            ซุปกระดูกหมู
            <input type="radio" name="soup" />
        </label> 

        <label>
            ซุปน้ำดำ
            <input type="radio" name="soup" />
        </label>
        
        <label>
            ซุปสุกี้
            <input type="radio" name="soup" />
        </label>
    <br>
    
        <p>เลือกของที่ชอบ</p>
        <label>
            เนื้อหมู
            <input type="checkbox" name="meat" value="pork" />
        </label>

        <label>
            เนื้อไก่
            <input type="checkbox" name="meat" value="chicken" />
        </label>

        <label>
            เห็ด
            <input type="checkbox" name="vegetable" value="mushroom" />
        </label>

        <label>
            ผัดกวางตุ้ง
            <input type="checkbox" name="vegetable" value="bokchoy" />
        </label>
    <br><br>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
